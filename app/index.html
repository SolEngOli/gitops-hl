
<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Hello GitOps</title>
		<style>
			:root{--bg:#0b0f12;--panel:#071014;--text:#9be79b;--muted:#8aa1a1}
			html,body{height:100%;margin:0}
			body{background:var(--bg);color:var(--text);font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,monospace;display:flex;align-items:center;justify-content:center}
			.card{background:linear-gradient(180deg,rgba(255,255,255,0.02),transparent);border:1px solid rgba(155,231,155,0.06);padding:32px;border-radius:6px;box-shadow:0 6px 24px rgba(2,6,8,0.6);max-width:720px}
			h1{margin:0 0 12px 0;font-size:28px;color:var(--text)}
			p{margin:0;color:var(--muted)}
			.meta{margin-top:12px;font-size:13px;color:var(--muted)}
		</style>
	</head>
	<body>
		<main class="card">
			<h1>Hello from my GitOps Lab</h1>
			<p>Built by Actions, stored in ghcr.io, deployed by Argo CD.</p>
			<div class="meta">Simple terminal-themed page for an nginx index.</div>
		</main>
	</body>
</html>
